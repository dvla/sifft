repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest-fast
        name: pytest (fast tests only)
        entry: uv run pytest tests/ --ignore=tests/demo -x
        language: system
        pass_filenames: false
        stages: [pre-push]
