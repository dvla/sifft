name: Publish

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            pyspark-pin: "pyspark>=3.5,<3.6"
            delta-pin: "delta-spark>=3.2,<4"
          - python-version: "3.13"
            pyspark-pin: "pyspark>=4.0,<4.1"
            delta-pin: "delta-spark>=4.0,<4.1"
          - python-version: "3.13"
            pyspark-pin: "pyspark>=4.1,<4.2"
            delta-pin: "delta-spark>=4.1,<4.2"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install dependencies
        run: |
          pip install -e ".[dev]" "${{ matrix.pyspark-pin }}" "${{ matrix.delta-pin }}"
      - run: pytest tests/ --ignore=tests/demo --cov -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          attestations: true
