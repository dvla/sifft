services:
  spark-test:
    build:
      context: .
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
        PYSPARK_VERSION: ${PYSPARK_VERSION:-4.1}
        DELTA_VERSION: ${DELTA_VERSION:-4.1}
    container_name: file-processing-spark
    volumes:
      - ./report.html:/app/report.html
      - ./file_processing:/app/file_processing
      - ./dataframe_validation:/app/dataframe_validation
      - ./table_writing:/app/table_writing
      - ./file_management:/app/file_management
      - ./tests:/app/tests
      - ./samples:/app/samples
    environment:
      - PYSPARK_PYTHON=python3
      - PYSPARK_DRIVER_PYTHON=python3
    command: tail -f /dev/null  # Keep container running
